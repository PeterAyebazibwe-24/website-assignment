<!DOCTYPE html>

        table {

            width: 100%;

        .social-links { margin-top: 15px; display: flex; gap: 15px; }
        .social-links a { 
            font-size: 1.5em; 
            text-decoration: none; 
            transition: transform 0.2s ease;
        }
        .social-links a:hover {
            transform: scale(1.2);
        }

        .x-link { color: #000000; }
        .fb-link { color: #1877F2; }
        .wa-link { color: #25D366; }
    </style>
</head>

                        </a>
                        <a href="https://www.facebook.com/" target="_blank" class="fb-link" title="Facebook">
                            <i class="fa-brands fa-facebook-f"></i>
                        </a>
                        <a href="https://wa.me/256XXXXXXXXX" target="_blank" class="wa-link" title="WhatsApp">
                            <i class="fa-brands fa-whatsapp"></i>

                    </div>
